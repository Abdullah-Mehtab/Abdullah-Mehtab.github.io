name: Build Game WASM

on:
  push:
    paths:
      - 'play/src/**'
      - 'Dockerfile.emscripten'
      - '.github/workflows/build-game.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build WASM via Docker
        run: |
          docker build -f Dockerfile.emscripten -t game-builder .
          docker run --rm -v ${{ github.workspace }}/play/dist:/build/dist game-builder

      - name: Verify build artifacts exist
        run: |
          test -f play/dist/engine.wasm || (echo "FAIL: engine.wasm not found" && exit 1)
          test -f play/dist/engine.js || (echo "FAIL: engine.js not found" && exit 1)
          wasm_size=$(stat -c%s play/dist/engine.wasm)
          echo "engine.wasm size: $wasm_size bytes"
          test "$wasm_size" -gt 100 || (echo "FAIL: engine.wasm suspiciously small" && exit 1)

      - name: Commit built artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add play/dist/engine.wasm play/dist/engine.js
          git diff --cached --quiet || git commit -m "build: update WASM artifacts [skip ci]"
          git push
